<div style="padding: 24px; padding-top: 48px;">
  <h1 style="font-size: 24px; font-weight: 700; margin-bottom: 24px;">Voice Settings</h1>
  
  <div class="voice-setting-row">
    <div>
      <div style="font-size: 16px; font-weight: 600;">Voice Feedback</div>
      <div style="font-size: 13px; color: var(--text2); margin-top: 4px;">Speak confirmations aloud</div>
    </div>
    <div class="toggle-switch on" id="toggle-voice-feedback" onclick="toggleVoiceFeedback()">
      <div class="toggle-knob"></div>
    </div>
  </div>

  <div class="voice-setting-row" style="margin-top: 24px;">
    <div>
      <div style="font-size: 16px; font-weight: 600;">Microphone Status</div>
      <div style="font-size: 13px; color: var(--green); margin-top: 4px;" id="mic-status-text">Active (Always Listening)</div>
    </div>
  </div>

  <div style="margin-top: 48px; text-align: center;">
    <button class="btn-primary" onclick="VoiceEngine.start()">Start Microphone</button>
  </div>
</div>
